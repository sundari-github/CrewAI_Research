research_task:
  description: >
    Conduct a thorough research about {topic}
    Make sure you find any interesting and relevant information given
    the current year is {current_year}.
  expected_output: >
    A list with 10 bullet points of the most relevant information about {topic}
  agent: researcher

reporting_task:
  description: >
    Review the context you got and expand each topic into a full section for a report.
    Make sure the report is detailed and contains any and all relevant information.
  expected_output: >
    A detailed professional report with the main topics, each with a full section of information.
    Formatted as markdown without '```'
  agent: reporting_analyst

email_task:
  description: >
    Create a professional email for {recipient_email_addr} summarizing the research findings.
    First draft a concise subject line and a clear body with bullet points.
    Then use the email_sending_tool to send the message to {recipient_email_addr}.
  expected_output: >
    A confirmation that the email was sent successfully, including the recipient address.
  agent: email_sender
